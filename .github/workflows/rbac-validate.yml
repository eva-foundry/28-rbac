name: RBAC Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rbac-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run RBAC validation
        run: python -m pytest rbac/tests/ -v --tb=short
      - name: Sync to Data Model
        env:
          DATA_MODEL_API: https://msub-eva-data-model.victoriousgrass-30debbd3.canadacentral.azurecontainerapps.io
        run: python scripts/sync-rbac-policies.py
